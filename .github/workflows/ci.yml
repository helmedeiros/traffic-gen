name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  build:
    name: lint + vet + test + cover + check-adrs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make ci-local

      - name: Compute coverage percentage
        id: coverage
        run: |
          if [ ! -f coverage.out ] || [ "$(wc -l < coverage.out | tr -d ' ')" -le 1 ]; then
            echo "value=0" >> "$GITHUB_OUTPUT"
            echo "color=lightgrey" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          if [ -z "$total" ]; then
            echo "value=0" >> "$GITHUB_OUTPUT"
            echo "color=lightgrey" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "value=$total" >> "$GITHUB_OUTPUT"
          if awk "BEGIN{exit ! ($total >= 90)}"; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 80)}"; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 70)}"; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      # On main: write coverage.json to the orphan `badges` branch so
      # shields.io can render the badge from the raw GitHub URL. Uses
      # the built-in GITHUB_TOKEN (no PAT, no repo secret). The badges
      # branch does not match the trigger filter above so this push
      # does not loop the workflow.
      - name: Update coverage badge branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COV_VALUE: ${{ steps.coverage.outputs.value }}
          COV_COLOR: ${{ steps.coverage.outputs.color }}
        run: |
          if ! git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            echo "badges branch does not exist yet -- skipping"
            exit 0
          fi
          git fetch origin badges
          git worktree add ../badges-wt badges
          cat > ../badges-wt/coverage.json << EOF
          {"schemaVersion":1,"label":"coverage","message":"${COV_VALUE}%","color":"${COV_COLOR}"}
          EOF
          cd ../badges-wt
          if git diff --quiet; then
            echo "coverage unchanged -- no commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git commit -m "ci(coverage): ${COV_VALUE}% on ${GITHUB_SHA:0:8}"
          git push origin badges

      - name: Post coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            **Coverage**: ${{ steps.coverage.outputs.value }}% (floor: 80%)

  image:
    name: build image (publish on main and tags)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the tag list applied to the image. On main pushes we
      # tag :main + :sha-<short>; on tag pushes we add the tag name
      # (e.g., :v0.0.2). PRs do not publish but the tag list still
      # populates so the build-and-don't-push verification path stays
      # identical to the publish path.
      - name: Compute image tags
        id: tags
        env:
          REPO: ghcr.io/${{ github.repository }}
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          tags="${REPO}:sha-${short_sha}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${REPO}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF#refs/tags/}"
            tags="${tags},${REPO}:${tag_name}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build (push only on main and tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/traffic-gen/Dockerfile
          # Multi-arch manifest list. amd64 = the runner's native arch
          # (no emulation in go build because the Dockerfile pins
          # --platform=$BUILDPLATFORM on the build stage and
          # cross-compiles via GOARCH). arm64 = Apple Silicon dev boxes
          # + Graviton production. See ADR-0005.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
