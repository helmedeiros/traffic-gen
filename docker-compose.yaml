# Two-service local stack for the Pricing Decision Platform.
#
# Pulls the published images from ghcr.io so operators do not need to
# clone the markup-svc repo to run a smoke. Both images are public.
#
# Usage:
#   docker compose up                     # foreground; both services + logs
#   docker compose up -d                  # detached; long-run mode
#   docker compose logs -f traffic-gen    # JSON log stream from the generator
#   docker compose down                   # stop and remove
#
# See docs/cookbook/long-run.md for the operator walkthrough.

services:
  markup-svc:
    image: ghcr.io/helmedeiros/markup-svc:v0.1.4
    command:
      - --rules=/etc/markup/rules.csv
      - --listen=:8080
    ports:
      - "8080:8080"
    volumes:
      - ./compose-fixtures/rules.csv:/etc/markup/rules.csv:ro
    healthcheck:
      # markup-svc /healthz returns 200 with {status:ok} once the
      # decider builds. wget is not in distroless, but we shell into
      # the container via docker exec for ad-hoc checks; compose's
      # built-in healthcheck stays as a doc of intent rather than an
      # actual probe in this minimal stack.
      disable: true

  traffic-gen:
    image: ghcr.io/helmedeiros/traffic-gen:v0.0.2
    depends_on:
      - markup-svc
    command:
      # Default to a 5-minute exponential ramp from 10 to 500 QPS,
      # then hold 500 QPS until the operator stops the stack (the
      # cmd-level --duration is left zero so the run is open-ended).
      # Operators wanting a different shape override `command` in a
      # compose.override.yaml or pass extra args to `docker compose
      # run traffic-gen`.
      - --target=http://markup-svc:8080/decide
      - --profile=exp:10->500@5m
      - --preset=default
